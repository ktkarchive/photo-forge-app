<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ktk.select</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="top">
        <div>
          <h1>ktk.select</h1>
          <p>Stitch-guided IBM Carbon Dark · 인간 친화형 단순 레이아웃</p>
        </div>
      </header>

      <main class="card">
        <div class="row two-col">
          <div>
            <label>프리셋</label>
            <div class="field">
              <select id="presetSelect">
                <option value="conservative">인물촬영(보수)</option>
                <option value="balanced" selected>인물촬영(균형)</option>
                <option value="aggressive">인물촬영(공격)</option>
              </select>
              <button id="savePreset">현재값 저장</button>
            </div>
          </div>
          <div>
            <label>파일명 충돌 정책</label>
            <select id="conflictPolicy">
              <option value="rename" selected>rename (자동 번호)</option>
              <option value="skip">skip</option>
              <option value="overwrite">overwrite</option>
            </select>
          </div>
        </div>

        <div class="row">
          <label>입력 폴더</label>
          <div class="field">
            <input id="inputDir" placeholder="/path/to/photos" />
            <button id="pickInput">찾기</button>
          </div>
        </div>

        <div class="row">
          <label>출력 폴더</label>
          <div class="field">
            <input id="outputDir" placeholder="/path/to/output" />
            <button id="pickOutput">찾기</button>
          </div>
        </div>

        <div class="grid">
          <div class="level"><span>눈감음</span><input id="eyes" type="range" min="0" max="3" value="2" /><b id="eyesVal">2</b></div>
          <div class="level"><span>피사체 초점</span><input id="focus" type="range" min="0" max="3" value="2" /><b id="focusVal">2</b></div>
          <div class="level"><span>흔들림</span><input id="blur" type="range" min="0" max="3" value="1" /><b id="blurVal">1</b></div>
          <div class="level"><span>노출 불량</span><input id="exposure" type="range" min="0" max="3" value="1" /><b id="exposureVal">1</b></div>
          <div class="level"><span>중복</span><input id="dup" type="range" min="0" max="3" value="1" /><b id="dupVal">1</b></div>
        </div>

        <div class="options">
          <label><input name="exportMode" type="radio" value="report" /> report mode(리포트만)</label>
          <label><input name="exportMode" type="radio" value="copy" checked /> copy mode(원본 유지 + 출력 폴더 복사)</label>
          <label><input name="exportMode" type="radio" value="move" /> move mode(원본 이동)</label>
        </div>

        <div class="actions">
          <button id="runBtn" class="primary">분석 실행</button>
          <button id="openOut">출력 폴더 열기</button>
          <button id="loadResult">결과 불러오기</button>
          <button id="saveOverrides">재분류 저장</button>
        </div>

        <pre id="log"></pre>

        <section class="reviewSection">
          <div class="reviewHeader">
            <h3>결과 검토 (Reject/Review 우선)</h3>
            <span id="reviewSummary">0건</span>
          </div>
          <div id="reviewGrid" class="reviewGrid"></div>
        </section>
      </main>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
