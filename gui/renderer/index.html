<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Forge</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="layout3">
      <aside class="leftPane">
        <div class="leftTop">
          <div class="logoSlot">Photo Forge</div>
          <div class="logoSub">로고/브랜드 영역</div>
        </div>

        <div class="leftCenter">
          <button id="runBtn" class="primary runBtn">분석실행</button>

          <div class="menuBlock">
            <label>프리셋</label>
            <div class="rowInline">
              <select id="presetSelect">
                <option value="conservative">인물촬영(보수)</option>
                <option value="balanced" selected>인물촬영(균형)</option>
                <option value="aggressive">인물촬영(공격)</option>
              </select>
              <button id="savePreset" class="ghost">저장</button>
            </div>
          </div>

          <div class="menuBlock">
            <div class="sliderRow"><span>연사</span><input id="burstLevel" type="range" min="0" max="3" step="1" value="2" /><b id="burstLevelVal">2</b></div>
          </div>

          <div class="menuBlock">
            <div class="blockTitle">셀렉 옵션</div>
            <div class="sliderRow"><span>눈감</span><input id="eyes" type="range" min="0" max="3" value="2" /><b id="eyesVal">2</b></div>
            <div class="sliderRow"><span>초점</span><input id="focus" type="range" min="0" max="3" value="2" /><b id="focusVal">2</b></div>
            <div class="sliderRow"><span>블러</span><input id="blur" type="range" min="0" max="3" value="1" /><b id="blurVal">1</b></div>
            <div class="sliderRow"><span>노출</span><input id="exposure" type="range" min="0" max="3" value="1" /><b id="exposureVal">1</b></div>
            <div class="sliderRow"><span>중복</span><input id="dup" type="range" min="0" max="3" value="1" /><b id="dupVal">1</b></div>
          </div>

        </div>

        <div class="leftBottom">
          <div class="pathRow">
            <span>입력</span>
            <input id="inputDir" placeholder="/path/to/photos" />
            <button id="pickInput" class="iconBtn" title="입력 폴더 찾기">📁</button>
          </div>
          <div class="pathRow">
            <span>출력</span>
            <input id="outputDir" placeholder="/path/to/output" />
            <button id="pickOutput" class="iconBtn" title="출력 폴더 찾기">📁</button>
          </div>
          <div class="leftBottomActions">
            <button id="openOut" class="ghost">출력 열기</button>
            <button id="openSettings" class="ghost">설정</button>
          </div>
        </div>
      </aside>

      <main class="centerPane">
        <div class="paneHeader">분석 결과</div>
        <div id="reviewPanel" class="reviewPanel hidden">
          <div class="reviewHead">
            <span id="modalSummary">0건</span>
          </div>
          <div class="reviewToolbar">
            <button id="cycleFilterBtn" class="cycleFilter mode-all" type="button">모두</button>
            <label>정렬
              <select id="reviewSort">
                <option value="score_desc" selected>점수 높은순</option>
                <option value="score_asc">점수 낮은순</option>
                <option value="name_asc">파일명 오름차순</option>
                <option value="name_desc">파일명 내림차순</option>
              </select>
            </label>
            <label class="scoreFilterWrap">강도조절
              <input id="reviewMinScore" type="range" min="0" max="15" value="0" />
              <b id="reviewMinScoreVal">0</b>
            </label>
            <label>보기
              <select id="viewMode">
                <option value="large" selected>크게보기</option>
                <option value="small">작게보기</option>
                <option value="list">목록</option>
              </select>
            </label>
          </div>
          <div class="hotkeyHint">단축키: ↑↓←→ 이동, A=승인, R=거절, Enter=확인, Esc=취소</div>
          <div id="reviewGrid" class="reviewGrid"></div>
          <div class="reviewActions">
            <button id="cancelReview" class="ghost">취소</button>
            <button id="confirmReview" class="primary">확인</button>
          </div>
        </div>
        <div id="emptyCenter" class="emptyCenter">분석실행을 누르면 결과가 여기에 표시됩니다.</div>
      </main>

      <aside class="rightPane">
        <div class="paneHeader">상세</div>
        <div id="selectionDetail" class="selectionDetail">
          <div class="kv"><span>파일명</span><b id="detailName">-</b></div>
          <div class="kv"><span>경로</span><b id="detailPath">-</b></div>
          <div class="kv"><span>결정</span><b id="detailDecision">-</b></div>
          <div class="kv"><span>점수합</span><b id="detailScore">-</b></div>
          <div class="kv"><span>연사</span><b id="detailBurst">-</b></div>
          <div class="kv"><span>사유</span><b id="detailReason">-</b></div>
        </div>
        <pre id="log"></pre>
      </aside>
    </div>

    <div id="settingsModal" class="settingsModal hidden">
      <div class="settingsCard">
        <div class="settingsHead">
          <h3>설정</h3>
          <button id="closeSettings" class="ghost">닫기</button>
        </div>
        <div class="settingsBody">
          <label class="radioRow"><input name="exportMode" type="radio" value="copy" checked /> copy mode(원본 유지 + 출력 폴더 복사)</label>
          <label class="radioRow"><input name="exportMode" type="radio" value="move" /> move mode(원본 이동)</label>
          <label>파일명 충돌 정책</label>
          <select id="conflictPolicy">
            <option value="rename" selected>rename (자동 번호)</option>
            <option value="skip">skip</option>
            <option value="overwrite">overwrite</option>
          </select>
        </div>
      </div>
    </div>

    <script src="./renderer.js"></script>
  </body>
</html>
